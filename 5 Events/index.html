<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0;
            margin: 0;
            box-sizing: border-box;

        }
        body,html{
            background-color: #222;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 30px;
            user-select: none;
        }
        #txt{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10rem;
            

            
        }
        #inp{
            background-color: azure;
            border: solid 1px white;
            padding: 5px;
            border-radius: 10px;
        }
        #file{
            display:none
        }
        #fileBtn{
            padding: 10px;
            font-weight: 900;
            font-size: 1.4rem;
            background-color: rgb(251, 6, 6);
            color: rgba(240, 255, 255, 0.854);
            border-radius: 10px;

        }
        #fileBtn:hover{
            background-color: rgb(177, 4, 4);
        }
        #form{
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input{
            padding: 5px;

        }

        #sub{
            background-color: rgb(243, 32, 32);
            color: white;
            font-weight: 600;
            font-size: 30px;
            border-radius: 10px;
            border: solid 2px white;
        }
        #cards{
            width: 100%;
            height: fit-content;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card{
            border:solid 2px #999;
            background-color: black;
            width: 200px;
            height: 300px;
            border-radius: 20px;
            flex-shrink: 0;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }
        .pTop{
            width: 100%;
            height: 30%; 
            display: flex;
            gap: 5px;
            justify-content: space-between;
        }
        .pImg{
            width: 40%;
            height: 100%;
            object-fit: cover;
            border-radius: 100%;

        }
        .pName{
            
            height: 100%;
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .name{
            font-size: 20px;

        }
        .domain{
            color: #999;
            font-size: 13px;
        }
        .pBtm{
            padding:5px;
            overflow-y: hidden;
            font-size: 15px;
            font-family:'Times New Roman', Times, serif;
            font-weight: 100;
        }
    </style>
</head>
<body>

    <form id="form" action="">
        <input id="Name" placeholder="Name" type="text">
        <input id="Domain" placeholder="Domain" type="text">
        <input id="About" placeholder="About" type="text">
        <input id="Img" placeholder="image URL" type="text">
        <button id="sub" type="submit">Submit</button>

    </form>

    <div id="cards">
        <div class="card">
            <div class="pTop">
                <img class="pImg" src="https://i.pinimg.com/1200x/2d/22/84/2d22841bef7ec0faeb68b8851eedd30d.jpg" alt="">
                <div class="pName">
                    <span class="name" >Aryaman Chauhan </span>
                    <span class="domain">Web Developer</span>
                </div>
            </div>
